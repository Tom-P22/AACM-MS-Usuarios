spring:
  application:
    name: ms-usuarios
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    clean-disabled: false

server:
  port: 8081

jwt:
  secret: ClaveUltraSecretaEInviolableParaLaMunicipalidad2026!
  issuer: ms-auth

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

springdoc:
  openapi:
    servers:
      - url: http://localhost:8080
        description: API Gateway (Entorno Local)